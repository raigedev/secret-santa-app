name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for smoke tests
        run: npx playwright install --with-deps chromium

      - name: Check VS Code Problems equivalents
        run: npm run check:problems

      - name: Check architecture boundaries
        run: npm run audit:architecture

      - name: Check production unused-code baseline
        run: npm run audit:unused:production

      - name: Check high-severity dependency advisories
        run: npm run audit:security

      - name: Build
        run: npm run build

      - name: Run Chromium public smoke tests
        run: npx playwright test tests/e2e/smoke/public-smoke.spec.ts --project=chromium --reporter=line
